# Local backend router: mimics Internal ALB path-based routing for A2/A4.
# /customers* -> Customer service (port 3000)
# A4: Book command/query are reached directly via BOOK_*_SERVICE_URL on BFFs (not via this router).

server {
    listen 3000;
    server_name _;

    location ~ ^/customers(/|$) {
        proxy_pass http://customer_service:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
