# A4 API: Web BFF (80), Mobile BFF (80), Customer service (3000), Book command (3000), Book query (3000), MongoDB.
# Local run: backend_router mimics Internal ALB for /customers only; BFFs call book services directly.
# Use: docker compose up -d
# Test Web BFF:  http://localhost:8080/status  (add X-Client-Type: Web, Authorization: Bearer <jwt>)

services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bookstore
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql:ro

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    expose:
      - "27017"

  customer_service:
    build:
      context: ./customer_service
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: customers_db
      PORT: "3000"
      KAFKA_BROKERS: kafka:9092
      ANDREW_ID: your_andrew_id
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  book_command:
    build:
      context: ./book_command_service
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: books_db
      PORT: "3000"
    expose:
      - "3000"
    depends_on:
      db:
        condition: service_healthy

  book_query:
    build:
      context: ./book_query_service
      dockerfile: Dockerfile
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: books
      MONGO_COLLECTION: books_asheriff
      ANDREW_ID: your_andrew_id
      PORT: "3000"
      # CMU course engine (Canvas): testing http://52.73.13.84 | Gradescope http://100.51.187.149
      RECOMMENDATION_SERVICE_URL: http://52.73.13.84
      RECOMMENDATION_PATH_TEMPLATE: /recommended-titles/isbn/{isbn}
      RELATED_BOOKS_TIMEOUT_SECONDS: "3"
      RELATED_BOOKS_CIRCUIT_OPEN_SECONDS: "60"
      CIRCUIT_STATE_FILE: /circuit/circuit_state.json
      OTEL_SDK_DISABLED: "true"
    volumes:
      - book_query_circuit_state:/circuit
    expose:
      - "3000"
    depends_on:
      - mongo

  book_data_sync:
    build:
      context: ./book_data_sync
      dockerfile: Dockerfile
    environment:
      DB_HOST: db
      DB_USER: app
      DB_PASSWORD: app
      DB_NAME: books_db
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB_NAME: books
      MONGO_COLLECTION: books_asheriff
      ANDREW_ID: your_andrew_id
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_started
    entrypoint: ["/bin/sh", "-c", "while true; do python sync.py; sleep 60; done"]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  crm_service:
    build:
      context: ./crm_service
      dockerfile: Dockerfile
    environment:
      KAFKA_BROKERS: kafka:9092
      ANDREW_ID: your_andrew_id
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: "587"
      SMTP_STARTTLS: "true"
      SMTP_USERNAME: your_email@gmail.com
      SMTP_PASSWORD: app_password
      SMTP_SENDER_EMAIL: your_email@gmail.com
    depends_on:
      - kafka

  backend_router:
    image: nginx:alpine
    volumes:
      - ./scripts/nginx-backend.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "3000"
    depends_on:
      - customer_service

  web_bff:
    build:
      context: .
      dockerfile: web_bff/Dockerfile
    environment:
      URL_BASE_BACKEND_SERVICES: http://backend_router:3000
      BOOK_COMMAND_SERVICE_URL: http://book_command:3000
      BOOK_QUERY_SERVICE_URL: http://book_query:3000
      PORT: "80"
    ports:
      - "8080:80"
    depends_on:
      - backend_router
      - book_command
      - book_query

  mobile_bff:
    build:
      context: .
      dockerfile: mobile_bff/Dockerfile
    environment:
      URL_BASE_BACKEND_SERVICES: http://backend_router:3000
      BOOK_COMMAND_SERVICE_URL: http://book_command:3000
      BOOK_QUERY_SERVICE_URL: http://book_query:3000
      PORT: "80"
    ports:
      - "8081:80"
    depends_on:
      - backend_router
      - book_command
      - book_query

volumes:
  book_query_circuit_state:
