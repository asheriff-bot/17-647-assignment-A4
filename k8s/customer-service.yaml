apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-service
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: customer-service
  template:
    metadata:
      labels:
        app: customer-service
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: customer-service
                topologyKey: kubernetes.io/hostname
      containers:
        - name: customer-service
          image: YOUR_REGISTRY/customer-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: DB_HOST
              value: YOUR_RDS_ENDPOINT
            - name: DB_USER
              value: YOUR_DB_USER
            - name: DB_PASSWORD
              value: YOUR_DB_PASSWORD
            - name: DB_NAME
              value: customers_db
            - name: KAFKA_BROKERS
              value: YOUR_KAFKA_BROKERS
            - name: ANDREW_ID
              value: your_andrew_id
            - name: PORT
              value: "3000"
          livenessProbe:
            httpGet:
              path: /status
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: customer-service
  namespace: bookstore-ns
spec:
  type: ClusterIP
  selector:
    app: customer-service
  ports:
    - protocol: TCP
      port: 3000
      targetPort: 3000
