apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobile-bff
  namespace: bookstore-ns
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mobile-bff
  template:
    metadata:
      labels:
        app: mobile-bff
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mobile-bff
                topologyKey: kubernetes.io/hostname
      containers:
        - name: mobile-bff
          image: YOUR_REGISTRY/mobile-bff:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: URL_BASE_BACKEND_SERVICES
              value: http://backend-router:3000
            - name: BOOK_COMMAND_SERVICE_URL
              value: http://book-command:3000
            - name: BOOK_QUERY_SERVICE_URL
              value: http://book-query:3000
            - name: PORT
              value: "80"
          livenessProbe:
            httpGet:
              path: /status
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mobile-bff
  namespace: bookstore-ns
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
spec:
  type: LoadBalancer
  externalTrafficPolicy: Cluster
  selector:
    app: mobile-bff
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
